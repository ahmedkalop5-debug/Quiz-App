<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background-glow glow-1"></div>
    <div class="background-glow glow-2"></div>

    <div class="container">

        <nav class="navbar">
            <div class="logo">
                🧠 Quiz App
            </div>
        </nav>

        <section class="hero">

            <div class="hero-content">

                <h1>
                    Welcome To The
                    <span>Quiz App</span>
                </h1>

                <p>
                    Test your knowledge with 10 questions in 5 minutes.
                    Challenge yourself and improve your skills.
                </p>

                <div class="stats">

                    <div class="stat-card">
                        <h2>10</h2>
                        <span>Questions</span>
                    </div>

                    <div class="stat-card">
                        <h2>5</h2>
                        <span>Minutes</span>
                    </div>

                    <div class="stat-card">
                        <h2>🏆</h2>
                        <span>Win Score</span>
                    </div>

                </div>

                <a href="question.html" class="start-btn">
                    Start Quiz →
                </a>

            </div>

            <div class="hero-image">

                <div class="brain-card">
                    🧠
                </div>

            </div>

        </section>

    </div>

</body>
</html>
